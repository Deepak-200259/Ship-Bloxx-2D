<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,minimal-ui">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ship Bloxx</title>
    <link rel="icon" type="image/x-icon" href="./assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="./index-B0xCBg3y.js"></script>
  <link rel="stylesheet" crossorigin href="./index-CpZj0qHe.css">
</head>
<body>
    <canvas id="canvas" class="hide"></canvas>
    <div id="scoreDisplay" class="score-display score-left hide">
      <span class="score-label">SCORE</span>
      <span class="score-value" id="currentScore">0</span>
    </div>
    <div class="content">
        <div class="loading">
            <div class="main">
                <img src="./assets/images/main-loading.gif" draggable="false">
                <div class="progress">
                    <div class="title font-wenxue">0%</div>
                    <div class="bar">
                        <div class="sub">
                            <div class="percent"></div>
                        </div>
                    </div>
                    <div class="text">Loading...</div>
                </div>
            </div>
        </div>
        <div class="landing hide">
            <div class="action-1"><img src="./assets/images/main-index-title.png" class="title swing" draggable="false"></div>
            <div class="action-2"><img id="start" src="./assets/images/main-index-start.png" class="start" draggable="false"></div>
        </div>
        <div id="gameOverPopup" class="game-over-popup hide">
            <div class="game-over-popup-mask"></div>
            <div class="game-over-panel">
                <span class="game-over-label">Game Over</span>
                <div class="game-over-content">
                    <p class="game-over-try-again">Try Again!</p>
                    <div class="game-over-score">
                        <span class="game-over-score-label">Score</span>
                        <span class="game-over-score-value" id="gameOverScore">0</span>
                    </div>
                </div>
                <button type="button" class="game-over-restart-btn js-reload">Replay</button>
            </div>
        </div>
    </div>
    <script src="./assets/scripts/zepto-1.1.6.min.js"></script>
</body>

</html>
